<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NeuroSpark AI</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

header {
    background: #1e293b;
    padding: 10px;
    text-align: center;
    font-weight: bold;
}

#topbar {
    display: flex;
    padding: 10px;
    background: #0f172a;
    gap: 10px;
}

select, button {
    padding: 8px;
    border-radius: 8px;
    border: none;
}

#chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
}

.msg {
    margin: 5px 0;
    padding: 10px;
    border-radius: 10px;
    max-width: 70%;
}

.user {
    background: #38bdf8;
    align-self: flex-end;
}

.bot {
    background: #22c55e;
    align-self: flex-start;
}

#inputArea {
    display: flex;
    padding: 10px;
    background: #1e293b;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
}

</style>
</head>

<body>

<header>⚡ NeuroSpark AI</header>

<div id="topbar">
    <select id="model">
        <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
        <option "google/gemini-3-flash-preview">Gemini flash</option>
        <option value="anthropic/claude-3-sonnet">Claude Sonnet</option>
        <option value="google/gemma-4-26b-a4b-it:free">Gemma</option>
        <option value="deepseek/deepseek-v4-flash">Deepseek v4 flash</option>
        <option value="mistralai/mistral-small-2603">Mistral small</option>
    </select>

    <button onclick="clearMemory()">🧹 Reset</button>
</div>

<div id="chat"></div>

<div id="inputArea">
    <input id="input" placeholder="Escribe algo..." />
    <button onclick="send()">Enviar</button>
</div>

<script>
const API_KEY = "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";

let messages = JSON.parse(localStorage.getItem("chatMemory")) || [
    { role: "system", content: "Eres NeuroSpark AI, un asistente inteligente experto en videojuegos y programación." }
];

const chatDiv = document.getElementById("chat");

function saveMemory() {
    localStorage.setItem("chatMemory", JSON.stringify(messages));
}

function renderChat() {
    chatDiv.innerHTML = "";
    messages.forEach(msg => {
        if (msg.role === "system") return;

        const div = document.createElement("div");
        div.className = "msg " + (msg.role === "user" ? "user" : "bot");
        div.innerText = msg.content;
        chatDiv.appendChild(div);
    });
    chatDiv.scrollTop = chatDiv.scrollHeight;
}

function addMessage(role, text) {
    messages.push({ role, content: text });
    saveMemory();
    renderChat();
}

async function send() {
    const input = document.getElementById("input");
    const text = input.value;
    if (!text) return;

    addMessage("user", text);
    input.value = "";

    addMessage("assistant", "Pensando...");

    const model = document.getElementById("model").value;

    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: {
            "Authorization": "Bearer " + API_KEY,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            model: model,
            messages: messages
        })
    });

    const data = await response.json();

    // borrar "Pensando..."
    messages.pop();

    const reply = data.choices?.[0]?.message?.content || "Error...";
    addMessage("assistant", reply);
}

function clearMemory() {
    localStorage.removeItem("chatMemory");
    messages = [
        { role: "system", content: "Eres NeuroSpark AI, un asistente inteligente experto en videojuegos y programación." }
    ];
    renderChat();
}

renderChat();
</script>

</body>
</html>
